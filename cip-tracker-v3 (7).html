<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CIP Tracker" />
<meta name="theme-color" content="#ffffff" />
<title>CIP Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#f3f5f7; --panel:#ffffff; --panelHi:#f5f7f9; --border:#dde3e8;
    --text:#1c2a33; --muted:#5b6b76; --faint:#8a98a2;
    --ok:#1f9d4d; --warn:#d97a06; --lock:#d8362b; --new:#7a8a94; --cip:#7c3aed;
    --green:#5db146; --orange:#e8431f; --csd:#0d8fcb; --hot:#d6306f; --other:#7a8a94;
    --brand:#e8431f; --brandgreen:#5db146; --inputbg:#ffffff;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);padding-bottom:48px;-webkit-font-smoothing:antialiased}
  button{cursor:pointer;font-family:inherit;border:none} button:disabled{cursor:not-allowed;opacity:.45}
  input,select{font-family:inherit}
  .wrap{max-width:760px;margin:0 auto}
  .head{border-bottom:1px solid var(--border);background:var(--panel);padding:14px 18px 0;box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .brandbar{display:flex;align-items:center;gap:7px;font-weight:800;font-size:15px;letter-spacing:-.2px}
  .brandbar .r{color:var(--brand)} .brandbar .swoosh{width:16px;height:9px;border-radius:0 0 16px 16px;border-bottom:3px solid var(--brandgreen);border-right:3px solid var(--brandgreen);transform:rotate(-12deg)}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .between{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-.3px}
  .sub{margin:6px 0 0 18px;font-size:13px;color:var(--muted)}
  .accentbar{width:10px;height:26px;border-radius:2px;background:linear-gradient(var(--green),var(--orange))}
  .clock-lbl{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
  .clock{font-size:15px;font-family:var(--mono)}
  .inp{display:block;width:100%;padding:10px 12px;background:var(--inputbg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px}
  .tabs{display:flex;gap:4px;margin-top:14px}
  .tab{padding:10px 16px;background:transparent;color:var(--muted);font-weight:600;font-size:15px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--text);border-bottom-color:var(--orange)}
  .pad{padding:0 18px}
  .chip{padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;background:transparent;color:var(--muted);border:1px solid var(--border)}
  .banner{margin:16px 18px 0;padding:14px 16px;border-radius:10px;display:flex;align-items:center;gap:12px}
  .dot{width:12px;height:12px;border-radius:99px;flex-shrink:0}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(20,40,60,.05)}
  .cardbody{padding:14px 16px}
  .tname{font-size:17px;font-weight:600}
  .tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .meta{margin-top:4px;font-size:12px;color:var(--faint);font-family:var(--mono)}
  .statebadge{font-size:11px;font-weight:700;letter-spacing:.6px;padding:4px 8px;border-radius:6px;white-space:nowrap}
  .count{font-family:var(--mono);font-size:26px;font-weight:600}
  .prog{margin-top:10px;height:7px;background:var(--panelHi);border-radius:99px;overflow:hidden}
  .btn{padding:11px 14px;border-radius:8px;font-size:14px}
  .btn-go{background:var(--brand);color:#ffffff;font-weight:700;flex:1 1 auto}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .editpanel{border-top:1px solid var(--border);background:var(--panelHi);padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .lbl{font-size:12px;color:var(--muted)} .lbl .inp{margin-top:6px}
  .lbox{padding:10px 12px;border-radius:8px;background:#f3effc;border:1px solid #7c3aed44;font-family:var(--mono);margin-top:12px}
  .lead{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
  .splitbar{margin-top:9px;height:8px;background:var(--panelHi);border-radius:99px;overflow:hidden;display:flex}
  .recent{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
  .empty{color:var(--muted);font-size:14px;padding:8px 2px}
  .danger{background:transparent;color:var(--lock);border:1px solid #ef444455;padding:8px 13px;border-radius:7px;font-size:13px}
  .softbtn{padding:8px 12px;border-radius:7px;font-size:13px;background:transparent;border:1px solid var(--border);color:var(--muted)}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
  .tbl th{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:600}
  .tbl td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center}
  .kpi .n{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1.1}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.2px}
  @media (max-width:420px){ .kpis{grid-template-columns:repeat(2,1fr)} }
  /* compact list rows -> tap to open detail */
  .rowitem{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;width:100%;text-align:left}
  .rowitem:active{background:var(--panelHi)}
  .rowitem .ri-main{flex:1;min-width:0}
  .rowitem .ri-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .rowitem .ri-sub{font-size:12px;color:var(--faint);font-family:var(--mono);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rowitem .chev{color:var(--faint);font-size:18px;flex-shrink:0}
  .miniprog{margin-top:7px;height:5px;background:var(--panelHi);border-radius:99px;overflow:hidden;width:100%}
  /* detail view */
  .backbtn{display:inline-flex;align-items:center;gap:6px;padding:10px 4px;font-size:14px;color:var(--muted);font-weight:600;background:transparent}
  .detailhead{padding:2px 0 4px}
  .bigcount{font-family:var(--mono);font-size:38px;font-weight:700;line-height:1.05}
  /* confirm panel */
  .confirm{border-top:1px solid var(--border);background:#fff8ec;padding:16px;display:flex;flex-direction:column;gap:10px}
  .confirm .ct{font-size:14px;font-weight:600;color:#92600a}
  /* bigger, glove-friendly buttons */
  .btn{min-height:48px;padding:12px 16px;border-radius:9px;font-size:15px;font-weight:600}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"><div style="padding:40px 18px;color:#8aa1b2;font-family:'Inter',sans-serif">Connecting to your CIP database…</div></div>
<input type="file" id="restoreFile" accept="application/json,.json" style="display:none" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { initializeFirestore, getFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, runTransaction, writeBatch,
  query, orderBy, limit, getDocs, where, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC91jaqseEbiOOvh5FT9DtatA_cpFFZacA",
  authDomain: "cip-tracker.firebaseapp.com",
  projectId: "cip-tracker",
  storageBucket: "cip-tracker.firebasestorage.app",
  messagingSenderId: "379848701627",
  appId: "1:379848701627:web:4f2dec3b89018419361b9e"
};
const app = initializeApp(firebaseConfig);
let db;
try { db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) }); }
catch(e){ db = getFirestore(app); }
const tanksCol = collection(db,"tanks");
const histCol  = collection(db,"history");
const usersCol = collection(db,"users");
const eventsCol= collection(db,"events");
const auth = getAuth(app);
const gprovider = new GoogleAuthProvider();

/* ---------- constants ---------- */
const DAY=86400000, HOUR=3600000, MIN=60000;
const CATS={csd:{label:"CSD",hex:"#0d8fcb"},hotfill:{label:"Hot-fill",hex:"#d6306f"},other:{label:"Other",hex:"#7a8a94"}};
const DEFAULTS=[
  {id:"tank-1",name:"Tank 1",category:"csd"},{id:"tank-2",name:"Tank 2",category:"csd"},
  {id:"tank-3",name:"Tank 3",category:"csd"},{id:"tank-5",name:"Tank 5",category:"csd"},
  {id:"tank-6",name:"Tank 6",category:"csd"},{id:"tank-7",name:"Tank 7",category:"csd"},
  {id:"tank-4",name:"Tank 4",category:"hotfill"},{id:"tank-8",name:"Tank 8",category:"hotfill"},
  {id:"tank-10",name:"Tank 10",category:"hotfill"},{id:"tank-11",name:"Tank 11",category:"hotfill"},
  {id:"sugar-tank",name:"Sugar Tank",category:"other"},{id:"sugar-truck",name:"Sugar Truck",category:"other"},
  {id:"bulk-1",name:"Bulk 1",category:"other"},{id:"bulk-2",name:"Bulk 2",category:"other"}
].map((t,i)=>Object.assign({},t,{lastCip:null,lock:null,cycleDays:7,warnHours:5,cipDurationMin:40,order:i}));

/* ---------- state ---------- */
const state={ tanks:[], history:[], operator:"", uid:null, user:null, role:null, adminExists:false, authReady:false, soundOn:true, ready:false, offline:false,
  ui:{tab:"tanks",filter:"all",statusFilter:null,period:"week",openId:null,openFinishId:null,openRinseId:null,rinseStartAt:null,selectedTankId:null,pendingFinish:null} };
function isAdmin(){ return state.role==="admin"||state.role==="supervisor"; }

function loadPrefs(){ try{ state.soundOn=localStorage.getItem("cipSound")!=="off"; }catch(e){} }
function saveSound(){ try{ localStorage.setItem("cipSound",state.soundOn?"on":"off"); }catch(e){} }

/* ---------- helpers ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function statusOf(t,now){
  if(!t.lastCip) return {state:"new",remaining:0,progress:0,lockoutMs:0};
  const lastMs=new Date(t.lastCip).getTime();
  const lockoutMs=lastMs+t.cycleDays*DAY, warnMs=lockoutMs-t.warnHours*HOUR;
  let st="ok"; if(now>=lockoutMs) st="locked"; else if(now>=warnMs) st="warning";
  return {state:st,remaining:lockoutMs-now,progress:Math.max(0,Math.min(1,(now-lastMs)/(t.cycleDays*DAY))),lockoutMs};
}
function pad(n){return String(n).padStart(2,"0");}
function sameLocalDay(msA,msB){const a=new Date(msA),b=new Date(msB);return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function warnSummaryText(){
  if(!state.tanks.length) return "";
  const cVals=[...new Set(state.tanks.map(t=>t.cycleDays||7))];
  const wVals=[...new Set(state.tanks.map(t=>t.warnHours||5))];
  const cText=cVals.length===1?(cVals[0]+"-day cycle"):("cycle length varies by tank ("+cVals.sort((a,b)=>a-b).join("/")+" d)");
  const wText=wVals.length===1?("warns "+wVals[0]+" h before lockout"):("warning time varies by tank ("+wVals.sort((a,b)=>a-b).join("/")+" h)");
  return cText+", "+wText;
}
const CIPFIELDS=[["prevFlavour","Previous flavour"],["causticBatch","Caustic batch #"],["causticStrength","Caustic strength (mS)"],["cipTempC","CIP temp (\u00b0C)"],["flowrate","Flowrate (m\u00b3/hr)"],["rinseCaustic","Final rinse Caustic"],["rinseTOA","Final rinse TOA"],["visual","Visual check"],["odour","Odour"],["notes","Notes"]];
function emptyCip(){return {prevFlavour:"",causticBatch:"",causticStrength:"",cipTempC:"",flowrate:"",rinseCaustic:"",rinseTOA:"",visual:"",odour:"",notes:""};}
const RINSEFIELDS=[["fromFlavour","From flavour"],["toFlavour","To flavour"],["notes","Notes"]];
function emptyRinse(){return {fromFlavour:"",toFlavour:"",rinseCount:"1",notes:""};}
function canWaterRinse(t,s){ return !t.lock && !!t.lastCip && s.state!=="locked"; }
function rinsesThisWeek(tankId,now){ const start=periodStart("week",now); return state.history.filter(x=>x.tankId===tankId&&x.type==="rinse"&&new Date(x.at).getTime()>=start).length; }
function fmtDur(ms){const a=Math.abs(ms),d=Math.floor(a/DAY),h=Math.floor((a%DAY)/HOUR),m=Math.floor((a%HOUR)/MIN);return d>0?(d+"d "+pad(h)+"h "+pad(m)+"m"):(pad(h)+"h "+pad(m)+"m");}
function fmtStamp(iso){return iso?new Date(iso).toLocaleString("en-AU",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true}):"\u2014";}
function fmtShort(iso){return new Date(iso).toLocaleString("en-AU",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true});}
function fmtCell(iso){if(!iso) return "";const d=new Date(iso);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes());}
function toLocalInput(iso){const d=iso?new Date(iso):new Date();return new Date(d.getTime()-d.getTimezoneOffset()*MIN).toISOString().slice(0,16);}
function periodStart(p,now){const d=new Date(now);
  if(p==="today"){d.setHours(0,0,0,0);return d.getTime();}
  if(p==="week"){const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d.getTime();}
  if(p==="7d") return now-7*DAY;
  if(p==="month"){d.setHours(0,0,0,0);d.setDate(1);return d.getTime();}
  return 0;}
const SHEX={locked:"#d8362b",warning:"#d97a06",new:"#7a8a94",ok:"#1f9d4d"};
const SL={locked:"LOCKED",warning:"CIP DUE SOON",new:"NO CIP LOGGED",ok:"IN CYCLE"};
const RANK={locked:0,warning:1,new:2,ok:3};
function findTank(id){return state.tanks.find(t=>t.id===id);}
function lastByFor(id){for(let i=0;i<state.history.length;i++){if(state.history[i].tankId===id) return state.history[i].by;}return "\u2014";}
function mergeDefaults(existing){
  const byName={}; DEFAULTS.forEach(d=>byName[d.name.toLowerCase()]=d);
  const up=existing.map(t=>{const d=byName[(t.name||"").toLowerCase()];
    return Object.assign({},t,{lock:t.lock||null,category:t.category||(d?d.category:"other"),
      cycleDays:t.cycleDays||7,warnHours:t.warnHours||5,cipDurationMin:t.cipDurationMin||40,order:(t.order!=null)?t.order:(d?d.order:9000)});});
  const have={}; up.forEach(t=>have[(t.name||"").toLowerCase()]=1);
  DEFAULTS.forEach(d=>{ if(!have[d.name.toLowerCase()]) up.push(Object.assign({},d)); });
  return up;
}

/* ---------- alarms ---------- */
let audioCtx=null, prevState={}, firstAlarmRun=true;
function ensureAudio(){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); }catch(e){} }
function beep(){ ensureAudio(); if(!audioCtx) return; const t0=audioCtx.currentTime;
  [0,0.28,0.56].forEach(off=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="square";o.frequency.value=880;o.connect(g);g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001,t0+off);g.gain.exponentialRampToValueAtTime(0.25,t0+off+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t0+off+0.2);o.start(t0+off);o.stop(t0+off+0.22);}); }
function notify(title,body){ try{ if(window.Notification&&Notification.permission==="granted") new Notification(title,{body}); }catch(e){} }
function checkAlarms(now){
  state.tanks.forEach(t=>{
    const st=t.lock?"cip":statusOf(t,now).state, prev=prevState[t.id];
    if(!firstAlarmRun && prev && prev!==st){
      if((st==="warning"||st==="locked") && state.soundOn){ beep(); notify(st==="locked"?(t.name+" is LOCKED"):(t.name+" \u2014 CIP due soon"), st==="locked"?"7-day lockout reached. Run CIP to unlock.":"Locks in under "+t.warnHours+" h."); }
      else if(prev==="cip" && st==="ok" && state.soundOn){ beep(); notify("CIP complete", t.name+" finished \u2014 7-day countdown restarted."); }
    }
    prevState[t.id]=st;
  });
  firstAlarmRun=false;
}
function toggleSound(){ state.soundOn=!state.soundOn; saveSound(); if(state.soundOn){ ensureAudio(); try{ if(window.Notification&&Notification.permission==="default") Notification.requestPermission(); }catch(e){} beep(); } render(); }

/* ---------- calendar reminders ---------- */
function icsDate(ms){return new Date(ms).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");}
function icsEsc(s){return String(s).replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n");}
function buildICS(items){
  const L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CIP Tracker//EN","CALSCALE:GREGORIAN"]; const stamp=icsDate(Date.now());
  items.forEach(it=>{ L.push("BEGIN:VEVENT","UID:"+it.id+"-"+it.lockoutMs+"@cip-tracker","DTSTAMP:"+stamp,
    "DTSTART:"+icsDate(it.lockoutMs),"DTEND:"+icsDate(it.lockoutMs+30*MIN),
    "SUMMARY:CIP lockout \u2014 "+icsEsc(it.name),
    "DESCRIPTION:"+icsEsc(it.name+" reaches its "+it.cycleDays+"-day lockout. Run CIP before this time."),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:CIP due soon \u2014 "+icsEsc(it.name)+" locks in "+it.warnHours+" h","TRIGGER:-PT"+it.warnHours+"H","END:VALARM",
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(it.name)+" is locking out now","TRIGGER:PT0S","END:VALARM","END:VEVENT"); });
  L.push("END:VCALENDAR"); return L.join("\r\n");
}
function reminderItems(idOnly){ const now=Date.now();
  return state.tanks.filter(t=>t.lastCip&&!t.lock&&(!idOnly||t.id===idOnly))
    .map(t=>{const s=statusOf(t,now);return {id:t.id,name:t.name,lockoutMs:s.lockoutMs,warnHours:t.warnHours,cycleDays:t.cycleDays};})
    .filter(it=>it.lockoutMs>now); }
function downloadReminders(idOnly){ const items=reminderItems(idOnly);
  if(items.length===0){ alert(idOnly?"This tank isn't in cycle yet. Finish a CIP first.":"No tanks in cycle yet. Finish a CIP first."); return; }
  download(buildICS(items),idOnly?("cip-reminder-"+idOnly+".ics"):"cip-reminders.ics","text/calendar"); }

/* ---------- export / download ---------- */
function download(text,name,type){ const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob),a=document.createElement("a"); a.href=url;a.download=name;a.click();URL.revokeObjectURL(url); }
function csvEsc(v){ v=String(v==null?"":v); return '"'+v.replace(/"/g,'""')+'"'; }
function exportStatusCSV(){ const now=Date.now();
  const rows=state.tanks.slice().sort((a,b)=>{const sa=statusOf(a,now),sb=statusOf(b,now);const r=RANK[sa.state]-RANK[sb.state];if(r)return r;if(sa.remaining!==sb.remaining)return sa.remaining-sb.remaining;return (a.order??9999)-(b.order??9999);});
  const L=[["Tank","Type","Status","Last CIP","Locks At","Hours Until Lock","Last CIP By"].map(csvEsc).join(",")];
  rows.forEach(t=>{const s=statusOf(t,now);const status=t.lock?"IN CIP":SL[s.state];const locksAt=t.lastCip?fmtCell(new Date(s.lockoutMs).toISOString()):"";const hrs=t.lastCip&&!t.lock?(s.remaining/3600000).toFixed(1):"";
    L.push([t.name,(CATS[t.category]||CATS.other).label,status,fmtCell(t.lastCip),locksAt,hrs,lastByFor(t.id)].map(csvEsc).join(","));});
  download(L.join("\r\n"),"cip-status.csv","text/csv"); }
function exportHistoryCSV(){ const L=[["Record","Start","End","Duration (min)","Operator","Tank","Category","Previous Flavour","Caustic Batch","Caustic Strength (mS)","CIP Temp (C)","Flowrate (m3/hr)","Final Rinse Caustic","Final Rinse TOA","Visual","Odour","From Flavour","To Flavour","Rinse Count","Notes"].map(csvEsc).join(",")];
  state.history.forEach(x=>L.push([(x.type==="rinse"?"Water Rinse":"CIP"),fmtCell(x.startAt||""),fmtCell(x.at),(x.durationMin!=null?x.durationMin:""),x.by,x.tankName,(CATS[x.category]||CATS.other).label,x.prevFlavour||"",x.causticBatch||"",x.causticStrength||"",x.cipTempC||"",x.flowrate||"",x.rinseCaustic||"",x.rinseTOA||"",x.visual||"",x.odour||"",x.fromFlavour||"",x.toFlavour||"",(x.type==="rinse"?("x"+(x.rinseCount||"1")):""),x.notes||""].map(csvEsc).join(",")));
  download(L.join("\r\n"),"cip-history.csv","text/csv"); }

/* ---------- cloud writes ---------- */
function tankData(t){ const {id,...rest}=t; return rest; }
function logEvent(action,tank,details){ try{ addDoc(eventsCol,{action,tankId:tank?tank.id:"",tankName:tank?tank.name:"",by:state.operator||"",byUid:state.uid||null,at:new Date().toISOString(),details:details||""}); }catch(e){} }
async function cloudStart(id,details){
  if(!state.uid){ alert("Please sign in first."); return; }
  try{
    await runTransaction(db, async tx=>{
      const ref=doc(db,"tanks",id), s=await tx.get(ref);
      if(!s.exists()) return; const d=s.data();
      if(d.lock) throw new Error("locked");
      tx.update(ref,{lock:{byUid:state.uid,by:state.operator,at:new Date().toISOString(),durationMin:d.cipDurationMin||40,details:details||emptyCip()}});
    });
    logEvent("start",{id,name:(findTank(id)||{}).name||id},"CIP started");
  }catch(e){ if(e&&e.message==="locked") alert("That tank was just started by someone else."); else console.error(e); }
}
async function cloudFinishNow(id,details){
  const ms=Date.now(), atISO=new Date(ms).toISOString();
  try{
    await runTransaction(db, async tx=>{
      const ref=doc(db,"tanks",id), s=await tx.get(ref); if(!s.exists()) return; const d=s.data();
      const by=(d.lock&&d.lock.by)||state.operator||"\u2014";
      const byUid=(d.lock&&d.lock.byUid)||state.uid||null;
      const startAt=(d.lock&&d.lock.at)||atISO;
      const durationMin=Math.max(0,Math.round((ms-new Date(startAt).getTime())/60000));
      const det=details||(d.lock&&d.lock.details)||emptyCip();
      tx.update(ref,{lastCip:atISO,lock:null});
      tx.set(doc(db,"history",id+"_"+ms),Object.assign({type:"cip",tankId:id,tankName:d.name,category:d.category||"other",by,byUid,at:atISO,startAt,durationMin},det));
    });
    logEvent("finish",{id,name:(findTank(id)||{}).name||id},"CIP finished");
  }catch(e){ console.error(e); }
}
async function cloudAutoFinish(id){
  try{
    await runTransaction(db, async tx=>{
      const ref=doc(db,"tanks",id), s=await tx.get(ref); if(!s.exists()) return; const d=s.data();
      if(!d.lock) return;
      const comp=new Date(d.lock.at).getTime()+(d.lock.durationMin||40)*60000;
      if(Date.now()<comp) return;
      const compISO=new Date(comp).toISOString();
      const durationMin=d.lock.durationMin||40;
      const det=d.lock.details||emptyCip();
      tx.update(ref,{lastCip:compISO,lock:null});
      tx.set(doc(db,"history",id+"_"+comp),Object.assign({type:"cip",tankId:id,tankName:d.name,category:d.category||"other",by:d.lock.by,byUid:d.lock.byUid||null,at:compISO,startAt:d.lock.at,durationMin},det));
    });
  }catch(e){ console.error(e); }
}
async function cloudLogRinse(id,details){
  if(!state.uid){ alert("Please sign in first."); return; }
  const t=findTank(id); if(!t){ return; }
  const ms=Date.now(), atISO=new Date(ms).toISOString();
  const startAt=details.startAt||atISO;
  const durationMin=Math.max(0,Math.round((ms-new Date(startAt).getTime())/60000));
  const det=Object.assign({},details); delete det.startAt;
  try{
    await setDoc(doc(db,"history",id+"_wr_"+ms),Object.assign({type:"rinse",tankId:id,tankName:t.name,category:t.category||"other",by:state.operator||"\u2014",byUid:state.uid,at:atISO,startAt,durationMin},det));
    logEvent("rinse",{id,name:t.name},"Water rinse x"+(details.rinseCount||"1")+" logged");
  }catch(e){ console.error(e); }
}

function cloudOverride(id){ if(confirm("Override and cancel a CIP another operator started?")) updateDoc(doc(db,"tanks",id),{lock:null}).then(()=>logEvent("override",{id,name:(findTank(id)||{}).name||id},"Admin override")).catch(console.error); }

async function seedDefaults(){ const b=writeBatch(db); DEFAULTS.forEach(t=>b.set(doc(db,"tanks",t.id),tankData(t))); try{ await b.commit(); }catch(e){ console.error(e); } }
async function restoreData(d){
  if(!d||!d.tanks){ alert("That file doesn't look like a CIP Tracker backup."); return; }
  if(!confirm("Restore this backup into the SHARED database? It adds/overwrites tanks (and history) for everyone.")) return;
  let b=writeBatch(db),n=0;
  for(const t of mergeDefaults(d.tanks)){ b.set(doc(db,"tanks",t.id),tankData(t)); if(++n>=400){await b.commit();b=writeBatch(db);n=0;} }
  if(n>0) await b.commit();
  if(d.history&&d.history.length){ b=writeBatch(db); n=0;
    for(const x of d.history){ const hid=x.id||(x.tankId+"_"+new Date(x.at).getTime()); b.set(doc(db,"history",hid),{tankId:x.tankId,tankName:x.tankName,category:x.category||"other",by:x.by,at:x.at}); if(++n>=400){await b.commit();b=writeBatch(db);n=0;} }
    if(n>0) await b.commit();
  }
  alert("Restored to the shared database.");
}

const autoInFlight={};
function maybeAutoFinish(){ const now=Date.now();
  state.tanks.forEach(t=>{ if(t.lock){ const comp=new Date(t.lock.at).getTime()+(t.lock.durationMin||40)*60000;

function computeKPIs(now){
  const completedToday=state.history.filter(x=>x.type!=="rinse"&&sameLocalDay(new Date(x.at).getTime(),now)).length;
  const running=state.tanks.filter(t=>t.lock).length;
  const locked=state.tanks.filter(t=>!t.lock&&statusOf(t,now).state==="locked").length;
  const dueToday=state.tanks.filter(t=>{ if(t.lock) return false; const s=statusOf(t,now); if(s.state==="new"||s.state==="locked") return false; return sameLocalDay(s.lockoutMs,now); }).length;
  return {completedToday,running,locked,dueToday};
}
function renderKPIs(now){

  } else {
    h+='<div style="margin-top:16px;font-family:var(--mono)">';
    if(s.state==="new") h+='<div style="font-size:15px;color:var(--muted)">Start a CIP to begin the 7-day countdown.</div>';
    else h+='<div style="display:flex;align-items:baseline;gap:9px"><span class="bigcount" style="color:'+col+'">'+fmtDur(s.remaining)+'</span><span style="font-size:13px;color:var(--muted)">'+(s.state==="locked"?"overdue \u2014 locked":"until lockout")+'</span></div><div style="font-size:12px;color:var(--faint);margin-top:4px">Locks at '+fmtStamp(new Date(s.lockoutMs).toISOString())+'</div>';

  }

  }
  h+='</div>';
  if(!confirming && canWaterRinse(t,s)){

  }
  h+='</div></div></div>';
  h+=tankHistorySection(t,now);
  return h;
}
function tankHistorySection(t,now){
  const start=periodStart("week",now);
  const own=state.history.filter(x=>x.tankId===t.id);
  const ownWeek=own.filter(x=>new Date(x.at).getTime()>=start);
  const cipWk=ownWeek.filter(x=>x.type!=="rinse").length, wrWk=ownWeek.filter(x=>x.type==="rinse").length;
  let h='<div class="pad" style="margin-top:20px"><div class="eyebrow">'+esc(t.name)+' \u2014 this week</div>';
  h+='<div class="row" style="margin-top:10px;gap:16px"><span style="font-size:14px"><span style="font-family:var(--mono);font-weight:700;font-size:18px;color:var(--ok)">'+cipWk+'</span> <span style="color:var(--muted)">CIP'+(cipWk===1?"":"s")+'</span></span><span style="font-size:14px"><span style="font-family:var(--mono);font-weight:700;font-size:18px;color:#0d8fcb">'+wrWk+'</span> <span style="color:var(--muted)">water rinse'+(wrWk===1?"":"s")+'</span></span></div></div>';
  if(own.length){
    h+='<div class="pad eyebrow" style="margin-top:18px">'+esc(t.name)+' \u2014 recent activity</div><div class="pad" style="margin-top:10px;display:flex;flex-direction:column">';

    h+='</div>';
  } else {
    h+='<div class="pad" style="margin-top:10px"><div class="empty">No CIP or rinse history yet for this tank.</div></div>';
  }
  return h;
}

function renderOverview(now){
  const rows=state.tanks.map(t=>({t,s:statusOf(t,now)})).sort((a,b)=>{
    if(!!b.t.lock!==!!a.t.lock) return a.t.lock?-1:1;
    const r=RANK[a.s.state]-RANK[b.s.state]; if(r) return r;
    if(a.s.remaining!==b.s.remaining) return a.s.remaining-b.s.remaining;
    return (a.t.order??9999)-(b.t.order??9999);});
  let h='<div class="pad" style="margin-top:16px"><button class="chip" data-act="exportStatus" style="color:var(--text)">\u2193 Export status to Excel (CSV)</button></div>';
  h+='<div style="overflow-x:auto;margin-top:14px;padding:0 18px"><table class="tbl"><thead><tr><th>Tank</th><th>Status</th><th>Last CIP</th><th>Locks at</th><th>Time left</th><th>Last by</th></tr></thead><tbody>';
  rows.forEach(c=>{const t=c.t,s=c.s,col=t.lock?"#a78bfa":SHEX[s.state];const status=t.lock?"IN CIP":SL[s.state];const locksAt=t.lastCip?fmtStamp(new Date(s.lockoutMs).toISOString()):"\u2014";
    let left; if(t.lock){const comp=new Date(t.lock.at).getTime()+(t.lock.durationMin||40)*60000;left="auto "+fmtDur(comp-now);} else if(s.state==="new") left="\u2014"; else if(s.state==="locked") left="locked"; else left=fmtDur(s.remaining);
    h+='<tr><td style="color:var(--text)">'+esc(t.name)+'</td><td style="color:'+col+';font-weight:600">'+status+'</td><td style="color:var(--muted)">'+fmtStamp(t.lastCip)+'</td><td style="color:var(--muted)">'+locksAt+'</td><td style="font-family:var(--mono);color:'+col+'">'+left+'</td><td style="color:var(--muted)">'+esc(lastByFor(t.id))+'</td></tr>';});
  h+='</tbody></table></div>'; return h;
}
function historyRow(x,showTank){
  const tankBit=showTank?'<span style="color:var(--faint)"> \u00b7 '+esc(x.tankName)+'</span>':'';
  if(x.type==="rinse"){
    const rbits=[]; if(x.durationMin!=null) rbits.push(x.durationMin+"min"); rbits.push(esc(x.fromFlavour||"?")+' \u2192 '+esc(x.toFlavour||"?"));
    return '<div style="padding:9px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;gap:10px;font-size:13px"><span><span class="tag" style="color:#0d8fcb;background:#0d8fcb1a;border:1px solid #0d8fcb44;margin-right:6px">WR x'+(x.rinseCount||"1")+'</span><span style="color:var(--text)">'+esc(x.by)+'</span>'+tankBit+'</span><span style="color:var(--faint);font-family:var(--mono);white-space:nowrap">'+fmtShort(x.at)+'</span></div><div style="font-size:12px;color:var(--faint);font-family:var(--mono);margin-top:3px">'+rbits.join(" \u00b7 ")+(x.notes?' \u00b7 '+esc(x.notes):'')+'</div></div>';
  }
  const bits=[]; if(x.cipTempC) bits.push(x.cipTempC+"\u00b0C"); if(x.flowrate) bits.push(x.flowrate+"m\u00b3/h"); if(x.causticStrength) bits.push(x.causticStrength+"mS"); if(x.durationMin!=null) bits.push(x.durationMin+"min");
  return '<div style="padding:9px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;gap:10px;font-size:13px"><span><span style="color:var(--text)">'+esc(x.by)+'</span>'+tankBit+'</span><span style="color:var(--faint);font-family:var(--mono);white-space:nowrap">'+fmtShort(x.at)+'</span></div>'+(bits.length?'<div style="font-size:12px;color:var(--faint);font-family:var(--mono);margin-top:3px">'+bits.join(" \u00b7 ")+(x.notes?' \u00b7 '+esc(x.notes):'')+'</div>':'')+'</div>';
}
function renderPeople(now){
  const ui=state.ui, start=periodStart(ui.period,now);
  const inP=state.history.filter(x=>new Date(x.at).getTime()>=start);
  const cipsP=inP.filter(x=>x.type!=="rinse"), rinsesP=inP.filter(x=>x.type==="rinse");
  const tally={}; cipsP.forEach(x=>{const k=x.byUid||((x.by||"\u2014").trim())||"\u2014"; if(!tally[k])tally[k]={name:x.by||"\u2014",count:0,csd:0,hotfill:0,other:0}; tally[k].count++; tally[k][x.category||"other"]++;});
  const rows=Object.keys(tally).map(k=>tally[k]).sort((a,b)=>b.count-a.count);
  const maxC=rows.length?rows[0].count:1;
  const periods=[["today","Today"],["week","This week"],["7d","Last 7 days"],["month","This month"],["all","All time"]];
  let h='<div class="row pad" style="margin-top:18px">';
  periods.forEach(p=>{const on=ui.period===p[0];h+='<button class="chip" data-act="period" data-val="'+p[0]+'" style="'+(on?"border-color:var(--orange);background:#f47b2022;color:var(--orange)":"")+'">'+p[1]+'</button>';});
  h+='</div><div class="pad" style="margin-top:14px;font-size:13px;color:var(--muted);font-family:var(--mono)">'+cipsP.length+' CIP'+(cipsP.length===1?"":"s")+' \u00b7 '+rows.length+' '+(rows.length===1?"person":"people")+(rinsesP.length?(' \u00b7 '+rinsesP.length+' water rinse'+(rinsesP.length===1?"":"s")):'')+'</div>';
  h+='<div class="pad" style="display:flex;flex-direction:column;gap:10px;margin-top:12px">';
  if(rows.length===0) h+='<div class="empty">No CIPs recorded in this period yet. Use Start \u2192 Finish on a tank.</div>';
  rows.forEach((r,i)=>{h+='<div class="lead"><div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px"><span style="font-size:16px;font-weight:600"><span style="color:var(--faint);font-family:var(--mono);margin-right:8px">'+(i+1)+'</span>'+esc(r.name)+'</span><span style="font-family:var(--mono);font-size:22px;font-weight:600;color:var(--orange)">'+r.count+'</span></div><div class="splitbar"><div style="width:'+(r.csd/maxC*100)+'%;background:#0d8fcb"></div><div style="width:'+(r.hotfill/maxC*100)+'%;background:#d6306f"></div><div style="width:'+(r.other/maxC*100)+'%;background:#7a8a94"></div></div><div style="margin-top:7px;font-size:12px;color:var(--faint)">'+r.csd+' CSD \u00b7 '+r.hotfill+' hot-fill \u00b7 '+r.other+' other</div></div>';});
  h+='</div>';
  if(inP.length>0){ h+='<div class="pad eyebrow" style="margin-top:22px">Recent activity</div><div class="pad" style="margin-top:10px;display:flex;flex-direction:column">';
    inP.slice(0,25).forEach(x=>h+=historyRow(x,true));
    h+='</div>'; }
  h+='<div class="pad row" style="margin-top:20px"><button class="softbtn" data-act="exportHistory">\u2193 Export history (CSV)</button>'+(isAdmin()?'<button class="danger" data-act="clearHistory">Clear tally history</button>':'')+'</div>';
  return h;
}

/* ---------- events ---------- */
document.addEventListener("click",e=>{
  ensureAudio();
  const el=e.target.closest("[data-act]"); if(!el) return;
  const act=el.dataset.act,id=el.dataset.id,val=el.dataset.val;
  if(act==="tab"){state.ui.tab=val;render();}
  else if(act==="filter"){state.ui.filter=val;render();}
  else if(act==="kpiFilter"){state.ui.statusFilter=(state.ui.statusFilter===val?null:val);state.ui.selectedTankId=null;render();}
  else if(act==="kpiToPeopleToday"){state.ui.tab="people";state.ui.period="today";render();}
  else if(act==="period"){state.ui.period=val;render();}
  else if(act==="edit"){state.ui.openId=(state.ui.openId===id?null:id);render();}
  else if(act==="openTank"){state.ui.selectedTankId=id;state.ui.openFinishId=null;state.ui.pendingFinish=null;render();}
  else if(act==="closeTank"){state.ui.selectedTankId=null;state.ui.openId=null;state.ui.openFinishId=null;state.ui.pendingFinish=null;render();}
  else if(act==="start"){cloudStart(id,emptyCip());}
  else if(act==="finishOpen"){state.ui.openFinishId=id;render();}
  else if(act==="finishCancel"){state.ui.openFinishId=null;render();}
  else if(act==="finishSubmit"){ const g=k=>{const el=document.getElementById("cf-"+k);return el?el.value.trim():"";}; const det={}; CIPFIELDS.forEach(f=>det[f[0]]=g(f[0])); state.ui.pendingFinish={id,details:det}; render(); }
  else if(act==="finish"){ state.ui.pendingFinish={id,details:null}; render(); }
  else if(act==="rinseOpen"){state.ui.openRinseId=id;state.ui.rinseStartAt=Date.now();render();}
  else if(act==="rinseCancel"){state.ui.openRinseId=null;state.ui.rinseStartAt=null;render();}
  else if(act==="rinseSubmit"){ const g=k=>{const el=document.getElementById("wr-"+k);return el?el.value.trim():"";}; const countEl=document.getElementById("wr-rinseCount"); const det=emptyRinse(); RINSEFIELDS.forEach(f=>det[f[0]]=g(f[0])); det.rinseCount=countEl?countEl.value:"1"; det.startAt=state.ui.rinseStartAt?new Date(state.ui.rinseStartAt).toISOString():null; state.ui.openRinseId=null; state.ui.rinseStartAt=null; cloudLogRinse(id,det); }
  else if(act==="confirmFinish"){ const p=state.ui.pendingFinish; if(p){ cloudFinishNow(p.id,p.details); } state.ui.pendingFinish=null; state.ui.openFinishId=null; }
  else if(act==="cancelFinish"){ state.ui.pendingFinish=null; render(); }
  else if(act==="cancel"){cloudCancel(id);}
  else if(act==="override"){cloudOverride(id);}
  else if(act==="claimAdmin"){claimAdmin();}
  else if(act==="resetTank"){cloudReset(id);}
  else if(act==="remove"){cloudRemove(id);render();}
  else if(act==="resetAll"){cloudResetAll();}
  else if(act==="setAllWarn"){ const el=document.getElementById("warnAllHours"); cloudSetAllWarn(el?el.value:0); }
  else if(act==="setAllCycle"){ const el=document.getElementById("cycleAllDays"); cloudSetAllCycle(el?el.value:0); }
  else if(act==="clearHistory"){cloudClearHistory();}
  else if(act==="add"){cloudAdd();}
  else if(act==="backup"){backup();}
  else if(act==="restore"){document.getElementById("restoreFile").click();}
  else if(act==="sound"){toggleSound();}
  else if(act==="remind"){downloadReminders(id);}
  else if(act==="remindAll"){downloadReminders(null);}
  else if(act==="exportStatus"){exportStatusCSV();}
  else if(act==="exportHistory"){exportHistoryCSV();}
  else if(act==="signin"){doSignIn();}
  else if(act==="signout"){signOut(auth).then(()=>location.reload());}
});

document.addEventListener("change",e=>{
  const t=e.target;
  if(t.id==="restoreFile"&&t.files&&t.files[0]){ const r=new FileReader(); r.onload=()=>{try{restoreData(JSON.parse(r.result));}catch(err){alert("Couldn't read that file.");}}; r.readAsText(t.files[0]); t.value=""; }
  else if(t.dataset.chg==="name"){cloudUpdate(t.dataset.id,{name:t.value});}
  else if(t.dataset.chg==="category"){cloudUpdate(t.dataset.id,{category:t.value});}
  else if(t.dataset.chg==="lastCip"){ if(t.value) cloudUpdate(t.dataset.id,{lastCip:new Date(t.value).toISOString()}); }
  else if(t.dataset.chg==="cycleDays"){cloudUpdate(t.dataset.id,{cycleDays:Math.max(1,parseInt(t.value)||1)});}
  else if(t.dataset.chg==="warnHours"){cloudUpdate(t.dataset.id,{warnHours:Math.max(1,parseInt(t.value)||1)});}
  else if(t.dataset.chg==="cipDurationMin"){cloudUpdate(t.dataset.id,{cipDurationMin:Math.max(1,parseInt(t.value)||1)});}
});
setInterval(()=>{ const a=document.activeElement; if(a&&(a.tagName==="INPUT"||a.tagName==="SELECT"||a.tagName==="TEXTAREA")) return; render(); },20000);

/* ---------- auth + subscribe ---------- */
let seeded=false, listenersStarted=false;
loadPrefs();
function startListeners(){
  if(listenersStarted) return; listenersStarted=true;
  onSnapshot(query(histCol,orderBy("at","desc"),limit(500)), snap=>{
    state.history=snap.docs.map(d=>Object.assign({id:d.id},d.data())); if(state.ready) render();
  }, err=>console.error("history listener",err));
  onSnapshot(tanksCol,{includeMetadataChanges:true}, snap=>{
    state.offline=snap.metadata.fromCache;
    state.tanks=snap.docs.map(d=>Object.assign({id:d.id},d.data())).sort((a,b)=>(a.order??9999)-(b.order??9999));
    state.ready=true;
    if(snap.docs.length===0 && !seeded && !snap.metadata.fromCache){ seeded=true; seedDefaults(); }
    render();
  }, err=>{ console.error("tanks listener",err); });
}
function doSignIn(){ ensureAudio(); signInWithPopup(auth,gprovider).catch(()=>{ signInWithRedirect(auth,gprovider); }); }
getRedirectResult(auth).catch(()=>{});
onAuthStateChanged(auth, async u=>{
  state.authReady=true; state.user=u;
  if(u){
    state.uid=u.uid; state.operator=u.displayName||u.email||"User";
    try{
      const uref=doc(db,"users",u.uid), us=await getDoc(uref);
      if(us.exists()){ state.role=us.data().role||"operator"; setDoc(uref,{email:u.email||"",displayName:state.operator},{merge:true}); }
      else { state.role="operator"; await setDoc(uref,{email:u.email||"",displayName:state.operator,role:"operator"}); }
      const aq=await getDocs(query(usersCol, where("role","==","admin"), limit(1)));
      state.adminExists=!aq.empty;
    }catch(e){ console.error("role check",e); state.role=state.role||"operator"; }
    startListeners(); render();
  } else { state.uid=null; state.operator=""; state.role=null; render(); }
});
</script>
